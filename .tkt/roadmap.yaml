      - Must NOT fan-out worker rollout
      - Must NOT auto-run DB migration
    depends_on: ["B-011"]

blocked_items:
  - id: PROC-001
    title: "master branch protection not enforced"
    category: ops/process
    status: blocked
    discovered_at: "2026-03-26T16:00:00Z"
    description: |
      docs/branch-protection.md defines ep-gate as required check and
      mandates PR before merge, but GitHub repository settings have
      NO branch protection rules configured on master.
      Direct push remains possible for any collaborator.
    required_actions:
      - "Enable branch protection on master in GitHub Settings > Branches"
      - "Require pull request before merging"
      - "Require status check: ep-gate"
      - "Require branches to be up to date before merging"
      - "Consider requiring at least 1 review approval"
    blocker_for: ["B-013 entry condition: no direct push as normal close-out"]

