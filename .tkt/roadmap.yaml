goals:
  - id: G-001
    title: "Infrastructure Repair & Skill System Completion"
    track: infrastructure
    status: done
    description: >
      Fix broken skill infra (mem.py ✅), complete DB migrations (v3 graph, v4 control-plane),
      establish docs/architecture.md as the project map.

  - id: G-002
    title: "Test Safety Net & Behavior Specs"
    track: stabilization
    status: done
    description: >
      Build test coverage for db_registry.py, preprocess.py core paths.
      Create behavior specs (SKILL.spec.yaml) for experiments.py module interactions
      to serve as refactoring contracts.

  - id: G-003
    title: "Modular Decomposition of experiments.py"
    track: architecture
    status: done
    description: >
      Split experiments.py (5293 lines) into runner/, tui/, preprocess/, registry/, cli/ modules.
      Use behavior specs to track and verify module interactions during and after refactoring.

  - id: G-004
    title: "Dual UX: Agent CLI + Human TUI"
    track: architecture
    status: in_progress
    depends_on: [G-003]
    description: >
      Every CLI command supports --json (agent) and rich output (human).
      Agent uses pipeline/cli/agent_cli.py for structured JSON.
      TUI dashboard remains human-only surface.
    progress: >
      B-011 completed: shared ControlPlaneService + ep_cli.py with --json.
      CLI v1 covers status/experiments/experiment/cluster read queries.
      Web dashboard wired through shared layer.

  - id: G-005
    title: "MLOps Automation & Experiment Comparison"
    track: mlops
    status: in_progress
    depends_on: [G-003]
    description: >
      Experiment comparison tool (side-by-side metrics from DB registry).
      One-click flow automation (ready.json → results).
      Experiment lineage tracking (hyperparams + data version + code version).
      Auto-generated summaries (human-readable + agent-parseable).

