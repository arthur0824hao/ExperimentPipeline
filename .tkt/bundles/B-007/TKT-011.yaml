  epoch\", j + 1) for j, entry in enumerate(entries) if metric in entry and isinstance(entry[metric],\
  \ (int, float))]\n      values = [entry[metric] for entry in entries if metric in\
  \ entry and isinstance(entry[metric], (int, float))]\n      if epochs and values:\n\
  \          ax.plot(epochs, values, marker=\".\", markersize=3, linewidth=1)\n  \
  \        ax.set_ylabel(metric)\n          ax.grid(True, alpha=0.3)\n          if\
  \ i == num_metrics - 1:\n              ax.set_xlabel(\"Epoch\")\n  plt.tight_layout()\n\
  \  os.makedirs(os.path.dirname(output_path) or \".\", exist_ok=True)\n  plt.savefig(output_path,\
