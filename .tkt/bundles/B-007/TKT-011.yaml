  \n\ndef _read_history(experiment_dir: str) -> List[Dict[str, Any]]:\n  history_file\
  \ = os.path.join(experiment_dir, \"metric_history.jsonl\")\n  entries: List[Dict[str,\
  \ Any]] = []\n  if not os.path.exists(history_file):\n      return entries\n  try:\n\
  \      with open(history_file, \"r\") as f:\n          for line in f:\n        \
  \      line = line.strip()\n              if line:\n                  entries.append(json.loads(line))\n\
  \  except Exception:\n      pass\n  return entries\n\n\ndef get_metric_summary(exp_name:\
  \ str, exp_dir: Optional[str] = None) -> Dict[str, Dict[str, Any]]:\n  if exp_dir\
  \ is None:\n      exp_dir = str(BASE_DIR / \"experiments\" / exp_name)\n  entries\
  \ = _read_history(exp_dir)\n  if not entries:\n      return {}\n  skip_keys = {\"\
  epoch\", \"total_epochs\", \"timestamp\", \"phase\", \"experiment\"}\n  metric_names\
  \ = set()\n  for entry in entries:\n      for k in entry:\n          if k not in\
  \ skip_keys and isinstance(entry[k], (int, float)):\n              metric_names.add(k)\n\
  \  summary: Dict[str, Dict[str, Any]] = {}\n  for metric in sorted(metric_names):\n\
  \      values = [entry[metric] for entry in entries if metric in entry and isinstance(entry[metric],\
  \ (int, float))]\n      if values:\n          summary[metric] = {\n            \
  \  \"min\": round(min(values), 4),\n              \"max\": round(max(values), 4),\n\
  \              \"final\": round(values[-1], 4),\n              \"mean\": round(sum(values)\
  \ / len(values), 4),\n              \"epochs_count\": len(values),\n          }\n\
  \  return summary\n\n\ndef generate_archive_card(exp_name: str, exp_dir: Optional[str]\
  \ = None, output_path: Optional[str] = None) -> Optional[str]:\n  if exp_dir is\
  \ None:\n      exp_dir = str(BASE_DIR / \"experiments\" / exp_name)\n  entries =\
  \ _read_history(exp_dir)\n  if not entries:\n      return None\n  if output_path\
  \ is None:\n      output_path = os.path.join(exp_dir, \"archive_card.png\")\n  skip_keys\
  \ = {\"epoch\", \"total_epochs\", \"timestamp\", \"phase\", \"experiment\"}\n  metric_names\
  \ = []\n  for entry in entries:\n      for k in entry:\n          if k not in skip_keys\
  \ and isinstance(entry[k], (int, float)) and k not in metric_names:\n          \
  \    metric_names.append(k)\n  if not metric_names:\n      return None\n  try:\n\
  \      import matplotlib\n      matplotlib.use(\"Agg\")\n      import matplotlib.pyplot\
