description: |
  Perform the mandatory end-of-bundle audit after all worker tickets complete.
  This audit is a hard gate: the bundle cannot be declared complete without evidence.

  Audit must verify:

  1. Full-suite regression:
     ```bash
     PYTHONPATH=pipeline python3 -m pytest pipeline/tests/ -q --tb=line
     ```
     Expected: all pass (346+ existing + new control_plane/ep_cli tests).

  2. Import smoke (must include new modules):
     ```bash
     PYTHONPATH=pipeline python3 -c "
     import allocator
     import artifact
     import cluster
     import control_plane
     import ep_cli
     import health
     import terminal_state
     import worker
     print('import smoke OK')
     "
     ```
     Expected: exit 0, prints "import smoke OK".

  3. CLI JSON sanity:
     ```bash
     PYTHONPATH=pipeline python3 -c "
     import json
     from unittest.mock import MagicMock
     import ep_cli

     # Mock ControlPlaneService to avoid DB
     mock_svc = MagicMock()
     mock_svc.get_status_summary.return_value = {'active': 0, 'completed': 0}
     ep_cli.ControlPlaneService = lambda: mock_svc

     import io, sys
     buf = io.StringIO()
     sys.stdout = buf
     code = ep_cli.main(['status', '--output', 'json'])
     sys.stdout = sys.__stdout__
     output = buf.getvalue()
     data = json.loads(output)
     assert data['status'] == 'ok', f'Expected ok, got {data[\"status\"]}'
     assert 'data' in data, 'Missing data key'
     print('CLI JSON sanity OK')
     "
     ```
     Expected: exit 0, prints "CLI JSON sanity OK".

  4. CI gate script sanity:
     ```bash
     bash -n scripts/ci_gate.sh
     ```
     Expected: exit 0.

  5. Py-compile for new modules:
     ```bash
     python3 -m py_compile pipeline/control_plane.py
     python3 -m py_compile pipeline/ep_cli.py
     ```
     Expected: exit 0 for both.

  6. Verify shared layer wiring:
     - web_dashboard.py imports ControlPlaneService
     - web_dashboard.py api_cluster and api_experiments use ControlPlaneService
     - ep_cli.py uses ControlPlaneService
     - Both go through the same query facade — no duplicate query logic

  7. Scope boundary check:
     - No changes to experiments.py main(), scheduler_loop, or input handling
     - No changes to UnifiedDashboard class
     - No changes to allocator, health, worker, terminal_state modules
     - No bounded extraction was attempted
     - No mutation/action commands in CLI (read-only only)
