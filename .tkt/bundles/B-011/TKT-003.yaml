  ```python
      app.state.control_plane = ControlPlaneService(
          db=app.state.db, cluster_mgr=app.state.cluster_mgr,
      )
  ```

  CHANGE 3 — Lines 136-144: Replace api_cluster body to use ControlPlaneService.

  OLD (exact lines 136-144):
  ```python
      @app.get("/api/cluster")
      def api_cluster() -> Dict[str, Any]:
          status = app.state.cluster_mgr.get_cluster_status(app.state.db)
          for node_id, info in status.items():
              disabled = bool(app.state.db.is_worker_disabled(node_id))
              info["worker_disabled"] = disabled
              if disabled:
                  info["status"] = "DISABLED"
          return {"cluster": status, "ts": int(time.time())}
  ```

  NEW:
  ```python
      @app.get("/api/cluster")
      def api_cluster() -> Dict[str, Any]:
          result = app.state.control_plane.get_cluster_health()
          result["ts"] = int(time.time())
          return result
  ```

  CHANGE 4 — Lines 146-160: Replace api_experiments body to use ControlPlaneService.

  OLD (exact lines 146-160):
  ```python
      @app.get("/api/experiments")
      def api_experiments(page: int = 1, per_page: int = 20) -> Dict[str, Any]:
          page = max(1, int(page))
          per_page = max(1, min(200, int(per_page)))
          rows = app.state.db.load_all_for_panel() or []
          total = len(rows)
          start = (page - 1) * per_page
          end = start + per_page
          return {
              "items": rows[start:end],
              "page": page,
              "per_page": per_page,
              "total": total,
              "total_pages": max(1, (total + per_page - 1) // per_page),
          }
  ```

  NEW:
  ```python
      @app.get("/api/experiments")
      def api_experiments(page: int = 1, per_page: int = 20) -> Dict[str, Any]:
          return app.state.control_plane.list_experiments(
              page=max(1, int(page)),
              per_page=max(1, min(200, int(per_page))),
          )
  ```

