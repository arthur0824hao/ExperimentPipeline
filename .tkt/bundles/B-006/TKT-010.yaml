title: "Create pipeline/archive_card.py — matplotlib chart generator from metric history"
description: |
  CONTEXT: New module that reads metric_history.jsonl and generates matplotlib charts for archive cards.

DEPENDS ON: TKT-008

NEW FILE: pipeline/archive_card.py

REQUIREMENTS:

1. Function: generate_archive_card(exp_name: str, exp_dir: Optional[str] = None, output_path: Optional[str] = None) -> Optional[str]
   - Reads metric_history.jsonl from exp_dir (default: BASE_DIR / 'experiments' / exp_name)
   - Returns path to generated PNG, or None if no history data
   
2. Chart Layout (single PNG, subplot grid):
   - Auto-detect available metrics from history entries (exclude epoch, total_epochs, timestamp, phase)
   - Create one subplot per metric (e.g., val_f1, loss, train_loss)
   - X-axis: epoch number
   - Y-axis: metric value
   - Title: experiment name
   - Each subplot has metric name as y-label
   - Grid lines, clean style (plt.style.use('seaborn-v0_8-whitegrid') or similar)
   - Figure size: auto-scale based on number of metrics, e.g., (10, 3*num_metrics)

3. Output:
   - Default output_path: exp_dir / 'archive_card.png'
   - Also generate a summary dict: {metric_name: {min, max, final, epochs}} for each metric
   - Return the PNG path

4. Edge Cases:
   - Empty or missing metric_history.jsonl → return None, no error
   - Single epoch → still generate chart (single point)
   - Mixed metrics across epochs (some epochs have metrics others dont) → plot available points only
   - Non-numeric metric values → skip that metric

5. Summary function: get_metric_summary(exp_name: str, exp_dir: Optional[str] = None) -> Dict
   - Returns {metric_name: {min, max, final, mean, epochs_count}} without generating chart
   - Used by archive workflow to embed summary in DB

IMPLEMENTATION NOTES:
  - import matplotlib; matplotlib.use('Agg')  # Non-interactive backend, MUST be before pyplot
  - Use tight_layout() to avoid label overlap
  - Close figure after saving (plt.close(fig)) to prevent memory leak
  - BASE_DIR = Path(__file__).parent.absolute() (same pattern as other pipeline modules)

MUST NOT:
  - Import matplotlib at module top level (wrap in function to avoid import cost on non-archive paths)
  - Use plt.show() (headless server)
  - Leave figures open (memory leak in long-running processes)

VERIFY: Create a test metric_history.jsonl with 5 epochs, call generate_archive_card(), verify PNG exists and is valid image.
