  #!/usr/bin/env python3
  """Tests for restore/resume contract (heal_from_running_process, stale checks)."""
  import sys
  from pathlib import Path
  from unittest.mock import MagicMock, patch, PropertyMock
  from datetime import datetime, timezone, timedelta

  import pytest

  sys.path.insert(0, str(Path(__file__).parent.parent))


  class TestHealFromRunningProcess:
      """Test db_registry.DBExperimentsDB.heal_from_running_process behavior.

      heal_from_running_process (db_registry.py ~2043) should:
      1. Return False if experiment not in DB
      2. Return True (no-op) if DB already shows correct worker/pid/status
      3. Update worker/gpu/pid/started_at if DB shows RUNNING with different owner
      4. Create new run_id and mark RUNNING if DB shows non-RUNNING status
      """

      @patch("db_registry.get_conn")
      def test_missing_experiment_returns_false(self, mock_conn):
          from db_registry import DBExperimentsDB
          db = DBExperimentsDB.__new__(DBExperimentsDB)
          db.dsn = None
          db.json_path = None
          db._run_ids = {}
          db._run_ids_lock = __import__("threading").Lock()
          db._last_heartbeat_error = None

          ctx = MagicMock()
          cur = MagicMock()
          cur.fetchone.return_value = None
          ctx.__enter__ = lambda s: ctx
          ctx.__exit__ = MagicMock(return_value=False)
          ctx.cursor.return_value.__enter__ = lambda s: cur
          ctx.cursor.return_value.__exit__ = MagicMock(return_value=False)
          mock_conn.return_value = ctx

          result = db.heal_from_running_process("nope", "w1", 0, 1234)
          assert result is False


  class TestCheckStaleSemantics:
      """Document that check_stale_experiments increments retry_count."""

      def test_stale_sec_default(self):
          from db_registry import DEFAULT_STALE_SEC
          assert DEFAULT_STALE_SEC > 0
          assert DEFAULT_STALE_SEC == 120

      def test_max_retry_constant(self):
          from db_registry import MAX_RETRY_COUNT
          assert MAX_RETRY_COUNT == 2
