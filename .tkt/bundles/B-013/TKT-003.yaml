  #!/usr/bin/env python3
  """Tests for grouped run semantics (parent/child, group_id, condition_parent)."""
  import sys
  from pathlib import Path
  from unittest.mock import MagicMock, patch

  import pytest

  sys.path.insert(0, str(Path(__file__).parent.parent))

  from db_registry import (
      derive_progression_status,
      PROGRESSION_BLOCKED_CONDITION,
      PROGRESSION_READY,
      PROGRESSION_COMPLETED,
  )


  class TestDeriveProgressionStatus:
      def test_ready_without_condition(self):
          status, reason = derive_progression_status("NEEDS_RERUN")
          assert status == PROGRESSION_READY
          assert reason is None

      def test_completed(self):
          status, reason = derive_progression_status("COMPLETED")
          assert status == PROGRESSION_COMPLETED

      def test_blocked_by_condition_parent(self):
          status, reason = derive_progression_status(
              "NEEDS_RERUN",
              condition_parent="parent_exp",
              condition_parent_status="NEEDS_RERUN",
          )
          assert status == PROGRESSION_BLOCKED_CONDITION
          assert reason is not None

      def test_unblocked_when_parent_completed(self):
          status, reason = derive_progression_status(
              "NEEDS_RERUN",
              condition_parent="parent_exp",
              condition_parent_status="COMPLETED",
          )
          assert status == PROGRESSION_READY


