     ```
     Expected: exit 0.

  3. Manifest CLI sanity:
     ```bash
     PYTHONPATH=pipeline python3 -c "
     import json
     from unittest.mock import MagicMock, patch
     import run_manifest, ep_cli

     mock_db = MagicMock()
     mock_db.get_experiment.return_value = {'name':'t','status':'COMPLETED','result':{'f1_score':0.9},'error_info':None,'running_on':None}
     mock_db.get_panel_truth.return_value = None
     with patch('run_manifest._read_result_payload', return_value=(None,None)), \
          patch('run_manifest._read_resource_usage', return_value=(None,None)), \
          patch('run_manifest.get_terminal_reason', return_value='COMPLETED'):
         m = run_manifest.build_manifest(mock_db, 't')
     assert m is not None
     assert m['schema_version'] == '1.0'
     assert m['name'] == 't'
     print('manifest contract OK')
     "
     ```

  4. Compare CLI sanity:
     ```bash
     PYTHONPATH=pipeline python3 -c "
     from compare import compare_manifests
     a = {'name':'a','status':'COMPLETED','result':{'f1_score':0.9,'auc_score':0.8,'peak_memory_mb':5000},'terminal_reason':'COMPLETED','script':'t.py','config':{'batch_size':32,'eval_batch_size':None},'lineage':{},'memory_contract':None,'retry_count':0,'oom_retry_count':0,'max_retries':2}
     b = dict(a, name='b', result={'f1_score':0.85,'auc_score':0.8,'peak_memory_mb':6000})
     diff = compare_manifests(a, b)
     assert 'f1_score' in diff['outcome']
     print('compare engine OK')
     "
     ```

  5. Scope boundary check:
     - No changes to experiments.py scheduler_loop / main / input handling
     - No changes to UnifiedDashboard
     - No changes to allocator, health, worker
     - No mutation commands in CLI
     - B-013 remains roadmap/ready only — no implementation started
