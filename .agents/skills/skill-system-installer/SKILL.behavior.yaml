schema_version: 1
skill_name: skill-system-installer
title: skill-system-installer Behavior Contract
purpose: 'Unified skill installer with global/local scoping and skills.sh CLI. Supports installing from GitHub (curated or
  custom repos), drift detection via lockfile hashing, and hub-spoke sync (global → local workspace). Entry point: scripts/skills.sh

  '
generated_from: SKILL.spec.yaml
updated_at: '2026-03-20T23:50:45.576630'
depends_on: []
delegates_to:
- skill-system-behavior
operations:
- name: bootstrap
  intent: Detect and scaffold the skill system into the current project
  inputs: []
  outputs:
  - checks
  - actions_taken
  constraints:
  - Must create only missing structure and never overwrite existing files
  - Must validate installed skills after scaffolding completes
- name: install
  intent: Install a skill from GitHub to global or local scope
  inputs:
  - repo
  - path
  - scope
  - force
  outputs:
  - result
  constraints:
  - Must validate SKILL.md exists in source before copying
  - Must create timestamped backup when --force overwrites existing skill
  - 'Global scope installs to $SKILLS_GLOBAL_HOME/skills/ (default: ~/.skills-system/skills/)'
  - Local scope installs to <workspace>/skills/
  - Must update corresponding lockfile (global or local) after install
- name: list
  intent: List installed skills with scope annotations and curated catalog
  inputs:
  - scope
  - format
  outputs:
  - skills_list
  constraints:
  - Must show both global and local skills when scope=all
  - Must annotate curated skills with install status
- name: update
  intent: Check skill drift against lockfile and optionally reinstall drifted skills
  inputs:
  - scope
  - skill
  - apply
  - dry_run
  outputs:
  - drift_report
  constraints:
  - Must compute SHA256 hash of entire skill directory (sorted file order)
  - Must compare against corresponding scope lockfile
  - Must not modify skills when dry_run=true
- name: sync
  intent: Synchronize global skills into local workspace (hub-spoke pull)
  inputs:
  - skills
  - strategy
  - force
  outputs:
  - sync_report
  constraints:
  - Must not overwrite local skills without --force
  - Must skip skills that already exist locally with matching hash
  - Symlink strategy creates relative symlinks from local → global
  - Copy strategy does full directory copy
  - Must update local lockfile after sync
