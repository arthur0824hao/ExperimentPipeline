schema_version: 1
skill_name: skill-system-gate
title: skill-system-gate Behavior Contract
purpose: 'Experiment validation gate for GNN/FraudDetect pipeline. Validates experiment code/logs against gate_bank.json rules
  (gate-ready-workflow) and checks DB registry state safety (registry-safety).

  '
generated_from: SKILL.spec.yaml
updated_at: '2026-03-09T12:08:24.985441'
depends_on: []
delegates_to: []
operations:
- name: validate-experiment
  intent: Verify experiment source code and logs comply with gate_bank rules before registration
  inputs:
  - exp_name
  - phase_root
  outputs:
  - report
  constraints:
  - Must not modify experiment source code or config files
  - 'Must fail-closed: any error-severity violation blocks the gate'
  - 'Must check all rule types: source_contains, source_not_contains, stderr_scan, file_exists, file_min_size'
- name: verify-registry
  intent: Check DB registry experiment state safety — prevent unsafe resets of RUNNING experiments
  inputs:
  - exp_name
  outputs:
  - safety_report
  constraints:
  - Must not force-overwrite RUNNING status experiments
  - Only check and recommend — never execute actual rerun/reset
  - Must report stale/zombie detection results
- name: status
  intent: Show current experiment queue and registry health overview
  inputs: []
  outputs:
  - dashboard
  constraints:
  - Read-only operation — must not modify any state
