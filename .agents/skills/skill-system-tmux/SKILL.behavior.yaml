schema_version: 1
skill_name: skill-system-tmux
title: skill-system-tmux Behavior Contract
purpose: 'Tmux execution support for long-running and persistent commands. Routes commands between direct bash and tmux based
  on expected duration.

  '
generated_from: SKILL.spec.yaml
updated_at: '2026-03-09T12:08:25.644375'
depends_on: []
delegates_to: []
operations:
- name: route-command
  intent: Decide whether a command should use direct bash or tmux
  inputs:
  - command
  - estimated_duration
  outputs:
  - result
  constraints:
  - Must route to tmux if estimated duration exceeds 60s
  - Must create unique session names with oc- prefix
- name: reclaim-resources
  intent: Cleanup stale agent tmux sessions and orphaned processes
  inputs:
  - scope
  outputs:
  - cleanup_report
  constraints:
  - Must only kill oc-* prefixed sessions by default
- name: manage-session
  intent: Create, list, check, capture, or kill tmux sessions
  inputs:
  - action
  - session_name
  outputs:
  - result
  constraints:
  - Must preserve non-agent infrastructure sessions unless explicitly requested
