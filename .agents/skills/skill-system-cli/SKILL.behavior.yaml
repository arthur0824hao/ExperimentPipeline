schema_version: 1
skill_name: skill-system-cli
title: skill-system-cli Behavior Contract
purpose: 'Unified CLI entry point for the entire Skill System. Thin dispatcher that routes to existing skill scripts. JSON-first
  output for agent consumption.

  '
generated_from: SKILL.spec.yaml
updated_at: '2026-03-21T00:10:10.142983'
depends_on:
- skill-system-router
- skill-system-tkt
- skill-system-memory
- skill-system-installer
delegates_to:
- skill-system-tkt
- skill-system-memory
- skill-system-installer
operations:
- name: init
  intent: Bootstrap project structure (config, note, tkt, postgres)
  inputs:
  - check
  outputs:
  - init_report
  constraints:
  - Idempotent — only create what's missing
  - Must preserve existing project files and only fill missing bootstrap assets
- name: status
  intent: Show global project health
  inputs: []
  outputs:
  - status_report
  constraints:
  - Must aggregate config, note, tkt, postgres, and skills status in one report
- name: config-get
  intent: Read a config value by dot-path
  inputs:
  - key
  outputs:
  - value
  constraints:
  - Must return explicit error when dot-path does not exist
- name: config-set
  intent: Set a config value by dot-path
  inputs:
  - key
  - value
  outputs:
  - value
  - file
  constraints:
  - Must persist YAML without dropping unrelated keys
- name: tkt-dispatch
  intent: Route to any tkt operation
  inputs:
  - args
  outputs:
  - payload
  constraints:
  - Must forward arguments to skill-system-tkt without reimplementing ticket logic
  - Must return the downstream JSON payload directly
- name: mem-dispatch
  intent: Route to any memory operation
  inputs:
  - args
  outputs:
  - payload
  constraints:
  - Must forward arguments to skill-system-memory without reimplementing memory logic
  - Must return the downstream JSON payload directly
- name: install-dispatch
  intent: Route to any installer operation
  inputs:
  - args
  outputs:
  - payload
  constraints:
  - Must forward arguments to skill-system-installer without reimplementing install logic
  - Must return the downstream JSON payload directly
