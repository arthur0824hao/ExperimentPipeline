schema_version: 1
skill_name: skill-system-eda
title: skill-system-eda Behavior Contract
purpose: >
  Exploratory Data Analysis skill for CSV and parquet datasets with deterministic profiling,
  drift and leakage analysis, contract generation, and optional memory writeback. Runtime is
  Polars-first with lazy scan strategy, high-cardinality guards, and Cramer's V support.
generated_from: SKILL.spec.yaml
depends_on:
  - skill-system-memory
delegates_to: []
operations:
  - name: profile-dataset
    intent: Generate a deterministic base profile.yaml and report.md for a dataset
    inputs:
      - input
      - target
      - output
      - sample
      - no_memory
    outputs:
      - profile
      - report
    constraints:
      - Must emit profile.yaml and report.md
      - Sampling must be deterministic via lazy head
      - Large CSV/parquet paths must use lazy scan strategy
      - High-cardinality categorical columns must be truncated to top-20 values
  - name: distribution-report
    intent: Append distribution and class-conditional analysis to an existing EDA profile
    inputs:
      - input
      - target
      - profile
    outputs:
      - profile
      - report
    constraints:
      - Must write class-conditional statistics and KS tests into profile.yaml and report.md
  - name: correlation-matrix
    intent: Compute feature-feature and feature-target correlations
    inputs:
      - input
      - target
      - profile
    outputs:
      - profile
      - report
    constraints:
      - Must produce top_with_target and high_inter_feature outputs
      - Must compute Cramer's V for categorical pairs when cardinality <= 50
  - name: anomaly-profiling
    intent: Rank class-conditional distribution shifts with effect sizes
    inputs:
      - input
      - target
      - profile
    outputs:
      - profile
      - report
    constraints:
      - Must compute top shifted features and Cohen's d effect sizes
  - name: feature-importance-scan
    intent: Rank features using mutual information and optional sklearn tree importance
    inputs:
      - input
      - target
      - profile
    outputs:
      - profile
      - report
    constraints:
      - Must still produce a ranking when sklearn tree importance is unavailable
      - Must skip one-hot expansion for categorical features with cardinality > 50
  - name: leakage-detector
    intent: Detect leakage signals and emit severity-graded findings
    inputs:
      - input
      - target
      - profile
    outputs:
      - profile
      - report
    constraints:
      - Correlation > 0.95 with target must be marked critical
  - name: save-contract
    intent: Generate a data contract from a saved EDA profile
    inputs:
      - profile
      - output
    outputs:
      - contract
    constraints:
      - Must emit a machine-readable contract with columns, nullability, and bounds
      - Truncated categorical columns must use cardinality_range instead of allowed_values
  - name: validate-contract
    intent: Validate a dataset against a saved contract and emit PASS/FAIL JSON
    inputs:
      - input
      - contract
    outputs:
      - validation
    constraints:
      - Must fail closed with a violation list when the contract is broken
