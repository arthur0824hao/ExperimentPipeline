schema_version: 1
skill_name: skill-system-review
title: skill-system-review Behavior Contract
purpose: 'Bridge between Prometheus review/planning flows and the TKT roadmap, bundle, and review inbox lifecycle. Builds
  structured review prompts, translates plans into TKT bundle commands, and writes review feedback back into TKT intake.

  '
generated_from: SKILL.spec.yaml
updated_at: '2026-03-20T23:38:56.734633'
depends_on:
- skill-system-tkt
delegates_to: []
operations:
- name: generate-review-prompt
  intent: Assemble structured review context from a completed or active ticket
  inputs:
  - ticket_id
  outputs:
  - review_context
  - prometheus_prompt
  constraints:
  - Must include roadmap summary plus bundle review context when available
  - Missing filesystem bundle must still return a DB-only fallback prompt
- name: generate-startup-review-prompt
  intent: Build startup overview for Prometheus review sessions
  inputs: []
  outputs:
  - roadmap_summary
  - bundles
  - prometheus_prompt
  constraints:
  - Must summarize roadmap stage and active bundles in one payload
- name: plan-to-bundle
  intent: Convert Prometheus plan markdown into TKT bundle creation commands
  inputs:
  - plan_file
  outputs:
  - goal
  - tickets
  - tkt_commands
  constraints:
  - Must parse headings and checkboxes into deterministic ticket candidates
  - Must preserve dependency markers as depends_on metadata when present
  - Must preserve category, effort, source, wave, skills, and QA metadata when detected
  - Must allow express routing for tiny plans without filename mentions when they have no dependencies or effort metadata
  - Must emit route-consistent commands for express vs bundle outputs
- name: generate-dispatch
  intent: Generate a worker dispatch prompt from bundle ticket state
  inputs:
  - bundle
  - tickets
  outputs:
  - dispatch
  constraints:
  - Must read bundle ticket metadata and group tickets into waves
  - Without --tickets it must emit only currently open worker tickets
  - Must include one-line summaries and effort estimates in the human-readable output
- name: write-review-inbox
  intent: Write Prometheus review feedback into the Review Agent Inbox format
  inputs:
  - input_file
  outputs:
  - inbox_path
  - tickets_written
  constraints:
  - Must append Review Agent Inbox content without clobbering unrelated note_tasks sections
  - Output must match parse_review_agent_inbox expected format
