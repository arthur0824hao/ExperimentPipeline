schema_version: 1
skill_name: skill-system-postgres
title: skill-system-postgres Behavior Contract
purpose: 'Postgres-backed observability, policy store, and skill dependency graph for the skill system. Provides tables for
  policy profiles, execution runs, step-level events, skill graph (nodes + edges), refresh/control-plane state, canonical
  rule hierarchy projections, and project architecture graph projections.

  '
