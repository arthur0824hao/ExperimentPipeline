depends_on: []
delegates_to: []
operations:
- name: check-policy
  intent: Check if a skill's effects are allowed by the active policy profile
  inputs:
  - policy_name
  - effects
  outputs:
  - policy_result
  constraints:
  - Must return blocked_effects list for any denied effects
  - Must handle missing policy profile gracefully
- name: log-run
  intent: Log a skill execution run for observability
  inputs:
  - skill_id
  - operation
  - status
  - duration_ms
  outputs:
  - run_id
  constraints:
  - Must use skill_system.run_status enum values
  - Must record timestamp automatically
- name: migrate-graph
  intent: Apply graph schema migration (skill_graph_nodes + skill_graph_edges tables)
  inputs:
  - action
  outputs:
  - migration_result
  constraints:
  - Must be idempotent (CREATE IF NOT EXISTS)
  - Must not drop or alter existing tables
  - Check action must not modify database
- name: migrate-control-plane
  intent: Apply refresh/control-plane migration for queued refresh jobs, events, and artifact versions
  inputs:
  - action
  outputs:
  - migration_result
  constraints:
  - Must be idempotent (CREATE IF NOT EXISTS)
  - Must not drop or alter existing tables
  - Check action must not modify database
- name: migrate-rule-model
  intent: Apply canonical rule hierarchy schema for projected rule sets and entries
  inputs:
  - action
  outputs:
  - migration_result
  constraints:
  - Must be idempotent (CREATE IF NOT EXISTS)
  - Must not drop or alter existing rows destructively
  - Check action must not modify database
- name: project-rules
  intent: Project canonical rule hierarchy from PostgreSQL into deterministic markdown surfaces
  inputs:
  - write_files
  outputs:
  - rule_model
  - written_files
  constraints:
  - 'Must keep merge priority deterministic: skill_system -> project -> compat'
  - Must derive projected markdown from PostgreSQL rows, not manual free-form editing
  - Must produce note/skill_system_rules.md, note/project_rules.md, and note/compat_rules.md when writing files
- name: migrate-project-graph
  intent: Apply canonical project architecture graph schema
  inputs:
  - action
  outputs:
  - migration_result
  constraints:
  - Must be idempotent (CREATE IF NOT EXISTS)
  - Must not drop or alter existing rows destructively
  - Check action must not modify database
- name: project-architecture
  intent: Sync canonical project architecture graph into PostgreSQL and deterministic markdown projection
  inputs:
  - write_file
  outputs:
  - architecture_graph
  - written_file
  constraints:
  - Must parse skills/*, note/*, review/*, and spec/* into a deterministic graph
  - Must emit Runtime Layers, Skill Graph, Document Graph, and Workflow Graph sections
  - Must derive note/architecture_map.md from PostgreSQL-backed project graph rows
- name: run-projection-engine
  intent: Write deterministic PostgreSQL-backed markdown projections with managed blocks
  inputs: []
  outputs:
  - written_files
  constraints:
  - Must use <!-- GENERATED_START --> and <!-- GENERATED_END --> managed blocks
  - Must preserve manual text outside managed blocks
  - Must be idempotent across repeated runs with unchanged PostgreSQL state
