schema_version: 1
skill_name: skill-system-tkt
description: >
  Canonical ticket lifecycle engine for multi-agent orchestration.
  Filesystem bundles for project-level work management,
  DB-backed durable tickets for session-level lifecycle.
  Single source of truth for all ticket operations.

depends_on:
  - skill-system-memory
delegates_to: []

operations:
  # --- Filesystem bundle ops (tkt.sh) ---
  - name: init-roadmap
    intent: "Initialize .tkt/ directory and roadmap.yaml"
    inputs:
      - name: project
        type: string
        required: true
    outputs:
      - name: roadmap_path
        type: string
    constraints:
      - "Creates .tkt/ at project root"
    expected_effects:
      - type: fs.write
        description: "Create .tkt/ directory structure"

  - name: create-bundle
    intent: "PM Agent creates TKT bundle from user intent"
    inputs:
      - name: goal
        type: string
        required: true
      - name: context
        type: string
        required: false
      - name: track
        type: string
        required: false
      - name: source_plan
        type: string
        required: false
      - name: worktree
        type: boolean
        required: false
      - name: carryover
        type: string
        required: false
    outputs:
      - name: bundle
        type: json
    constraints:
      - "2-6 worker tickets per bundle (see config/tkt.yaml)"
      - "worktree creates .worktrees/B-NNN and persists worktree_path/worktree_branch when requested"
      - "carryover imports tickets from an existing carryover.yaml"
    expected_effects:
      - type: fs.write
        description: "Create bundle directory with tickets"
      - type: proc.exec
        description: "May invoke git worktree commands"

  - name: claim
    intent: "Claim a filesystem ticket within a bundle"
    inputs:
      - name: bundle
        type: string
        required: true
      - name: ticket
        type: string
        required: true
      - name: agent
        type: string
        required: true
    outputs:
      - name: ticket
        type: json
    constraints:
      - "Must refuse claim unless ticket is open or blocked"
    expected_effects:
      - type: fs.write

  - name: update
    intent: "Update a filesystem ticket status and result summary"
    inputs:
      - name: bundle
        type: string
        required: true
      - name: ticket
        type: string
        required: true
      - name: status
        type: string
        required: true
      - name: summary
        type: string
        required: false
      - name: evidence
        type: string
        required: false
      - name: evidence_file
        type: string
        required: false
      - name: reason
        type: string
        required: false
    outputs:
      - name: ticket
        type: json
    constraints:
      - "Status must be one of the configured filesystem ticket states"
      - "Status done requires evidence or evidence_file"
      - "Status blocked requires reason"
      - "Invalid filesystem state transitions must fail"
    expected_effects:
      - type: fs.read
      - type: fs.write

  - name: add
    intent: "Add a filesystem worker ticket with structured metadata"
    inputs:
      - name: bundle
        type: string
        required: true
      - name: title
        type: string
        required: true
      - name: description
        type: string
        required: false
      - name: category
        type: string
        required: false
      - name: effort_estimate
        type: string
        required: false
      - name: skills
        type: string
        required: false
      - name: wave
        type: number
        required: false
      - name: qa_scenarios
        type: string
        required: false
      - name: depends_on
        type: string
        required: false
      - name: source_plan
        type: string
        required: false
      - name: source_ticket_index
        type: number
        required: false
      - name: acceptance
        type: string
        required: false
    outputs:
      - name: ticket
        type: json
    constraints:
      - "Must persist structured metadata to the filesystem ticket YAML"
      - "skills and qa_scenarios are list metadata; wave is optional numeric metadata"
    expected_effects:
      - type: fs.write

  - name: express
    intent: "Manage express tickets without requiring a bundle"
    inputs:
      - name: action
        type: string
        required: false
      - name: title
        type: string
        required: false
      - name: acceptance
        type: string
        required: false
      - name: category
        type: string
        required: false
      - name: effort_estimate
        type: string
        required: false
      - name: wave
        type: number
        required: false
      - name: source_plan
        type: string
        required: false
      - name: source_ticket_index
        type: number
        required: false
      - name: ticket_id
        type: string
        required: false
      - name: agent
        type: string
        required: false
      - name: files_changed
        type: number
        required: false
      - name: evidence
        type: string
        required: false
      - name: evidence_file
        type: string
        required: false
    outputs:
      - name: ticket
        type: json
    constraints:
      - "Must support create, list, claim, and close subflows for express tickets"
      - "Close requires evidence or evidence_file"
      - "Close with files_changed > 3 auto-upgrades into a bundle worker ticket"
    expected_effects:
      - type: fs.read
      - type: fs.write

  - name: bundle-status
    intent: "Show bundle status with all tickets"
    inputs:
      - name: bundle
        type: string
        required: true
    outputs:
      - name: status
        type: json
    constraints:
      - "Must include all ticket states for the requested bundle"
    expected_effects:
      - type: fs.read

  - name: close-bundle
    intent: "Close bundle after all worker TKTs done/failed"
    inputs:
      - name: bundle
        type: string
        required: true
      - name: merge
        type: boolean
        required: false
    outputs:
      - name: result
        type: json
    constraints:
      - "All worker TKTs must be done or failed"
      - "Audit ticket must be claimed and done before bundle close"
      - "Audit ticket must not be claimed by the same agent as any worker ticket"
      - "review.yaml must auto-fill evidence_summary and acceptance_results"
      - "acceptance failures generate carryover.yaml and carryover_count output"
      - "worktree-backed bundles must be clean before close and may merge/remove on request"
      - "Must run structural validation and optional close_gate command before closure"
      - "Must evaluate command-based acceptance criteria before closure"
    expected_effects:
      - type: fs.read
      - type: fs.write
      - type: proc.exec

  - name: list-bundles
    intent: "List all bundles and their status"
    outputs:
      - name: bundles
        type: json
    constraints:
      - "Must include bundle identifiers and current status summaries"
    expected_effects:
      - type: fs.read

  - name: roadmap-transition
    intent: "Transition roadmap to a new stage with gate checks"
    inputs:
      - name: stage
        type: string
        required: true
      - name: reason
        type: string
        required: true
      - name: force
        type: boolean
        required: false
    outputs:
      - name: transition
        type: json
    constraints:
      - "Must reject invalid roadmap stages unless explicitly forced by policy"
    expected_effects:
      - type: fs.read
      - type: fs.write

  - name: roadmap-status
    intent: "Show roadmap stage, bundle summary, and allowed transitions"
    outputs:
      - name: roadmap
        type: json
    constraints:
      - "Must report current stage and allowed next stages"
    expected_effects:
      - type: fs.read

  - name: generate-review
    intent: "Generate review bundle post-closure"
    inputs:
      - name: bundle
        type: string
        required: true
    outputs:
      - name: review
        type: json
    constraints:
      - "Must only run after bundle closure artifacts exist"
    expected_effects:
      - type: fs.write

  # --- DB ticket lifecycle ops (tickets.py) ---
  - name: intake-ticket
    intent: "Create or sync durable ticket from note_tasks intake"
    inputs:
      - name: ticket_id
        type: string
        required: false
      - name: title
        type: string
        required: false
      - name: from_note_tasks
        type: boolean
        required: false
    outputs:
      - name: ticket
        type: json
    constraints:
      - "Must support note/note_tasks.md as intake surface"
      - "Must persist task_provenance for downstream filtering"
    expected_effects:
      - type: fs.read
        description: "Read note_tasks"
      - type: db.write
        description: "Insert/sync ticket"

  - name: list-tickets
    intent: "List durable workflow tickets"
    inputs:
      - name: unresolved_only
        type: boolean
        required: false
      - name: batch_id
        type: string
        required: false
    outputs:
      - name: tickets
        type: json
    constraints:
      - "Must support unresolved_only and batch_id filtering"
    expected_effects:
      - type: db.read

  - name: claim-ticket
    intent: "Claim a ticket for the current session"
    inputs:
      - name: ticket_id
        type: string
        required: true
      - name: session_id
        type: string
        required: true
    outputs:
      - name: ticket
        type: json
    constraints:
      - "One session may hold at most one active claimed ticket"
      - "Claim must be transactional and conflict-safe"
    expected_effects:
      - type: db.write

  - name: block-ticket
    intent: "Mark a ticket as blocked"
    inputs:
      - name: ticket_id
        type: string
        required: true
      - name: reason
        type: string
        required: false
    constraints:
      - "Block must fail unless ticket is claimed by same session"
    expected_effects:
      - type: db.write

  - name: close-ticket
    intent: "Close the currently claimed ticket"
    inputs:
      - name: session_id
        type: string
        required: true
      - name: ticket_id
        type: string
        required: false
      - name: resolution
        type: string
        required: false
    constraints:
      - "Must run refresh-new-tasks first"
      - "Integrator closure refused if new claimable tasks exist"
    expected_effects:
      - type: db.write

  - name: check-open-tickets
    intent: "Report unresolved tickets"
    inputs:
      - name: session_id
        type: string
        required: false
    outputs:
      - name: report
        type: json
    constraints:
      - "Must report unresolved durable tickets in a machine-readable summary"
    expected_effects:
      - type: db.read

  - name: claim-summary
    intent: "Report batch/session claim ownership with policy snapshot"
    inputs:
      - name: session_id
        type: string
        required: false
      - name: batch_id
        type: string
        required: false
    constraints:
      - "Must include collaboration policy, method laws, subagent playbook"
    expected_effects:
      - type: db.read

  - name: session-loop
    intent: "Run the legal worker loop for one session"
    inputs:
      - name: session_id
        type: string
        required: true
      - name: batch_id
        type: string
        required: false
    constraints:
      - "Must refresh before any claim/stop decision"
      - "Must resume owned ticket before claiming new"
    expected_effects:
      - type: db.read
      - type: db.write

  - name: refresh-new-tasks
    intent: "Re-read note_tasks ### New and ingest new work"
    inputs:
      - name: batch_id
        type: string
        required: false
    outputs:
      - name: refresh_status
        type: json
    constraints:
      - "Must ingest only newly discovered work items from note_tasks"
    expected_effects:
      - type: fs.read
      - type: db.write

  - name: refresh-review-inbox
    intent: "Parse review inbox and ingest inbox-derived tickets"
    inputs:
      - name: batch_id
        type: string
        required: false
    outputs:
      - name: refresh_status
        type: json
    constraints:
      - "Must preserve previously ingested review inbox items without duplication"
    expected_effects:
      - type: fs.read
      - type: db.write

  - name: startup-flow
    intent: "Startup/claim-loop context from zero to review handoff"
    inputs:
      - name: session_id
        type: string
        required: false
    outputs:
      - name: startup_context
        type: json
    constraints:
      - "Must summarize owned tickets, claimable work, and review handoff context"
    expected_effects:
      - type: db.read

  - name: integrator-closure-report
    intent: "Report whether integrator can legally close the batch"
    inputs:
      - name: session_id
        type: string
        required: true
    constraints:
      - "Must refuse with CONTINUE_DUE_TO_NEW_TASKS if refresh finds new work"
    expected_effects:
      - type: db.read

  - name: check-ticket-scope
    intent: "Report if changed files stay inside claimed ticket scope"
    inputs:
      - name: ticket_id
        type: string
        required: true
    constraints:
      - "Must report CLEAN or SCOPE_BREACH"
    expected_effects:
      - type: proc.exec
        description: "git status for changed files"

acceptance_tests:
  structural:
    - id: manifest-valid
      assert: "manifest exposes all bundle and DB ticket operations"
    - id: scripts-exist
      assert: "tkt.sh and tickets.py exist in scripts/"
  behavioral:
    - id: bundle-lifecycle
      given: "PM Agent creates a bundle"
      when: "All worker tickets complete"
      then: "Bundle can be closed and review generated"
    - id: one-ticket-at-a-time
      given: "Session already owns a claimed ticket"
      when: "claim-ticket called for another"
      then: "Claim fails"
    - id: integrator-closure-guard
      given: "Refresh finds new claimable tasks"
      when: "integrator-closure-report called"
      then: "Refused with CONTINUE_DUE_TO_NEW_TASKS"
    - id: scope-enforcement
      given: "Claimed ticket with scope rules"
      when: "check-ticket-scope called"
      then: "CLEAN or SCOPE_BREACH reported with details"
