schema_version: 1
skill_name: skill-system-tkt
title: skill-system-tkt Behavior Contract
purpose: 'Canonical ticket lifecycle engine for multi-agent orchestration. Filesystem bundles for project-level work management,
  DB-backed durable tickets for session-level lifecycle. Single source of truth for all ticket operations.

  '
generated_from: SKILL.spec.yaml
updated_at: '2026-03-20T23:50:45.794877'
depends_on:
- skill-system-memory
delegates_to: []
operations:
- name: init-roadmap
  intent: Initialize .tkt/ directory and roadmap.yaml
  inputs:
  - project
  outputs:
  - roadmap_path
  constraints:
  - Creates .tkt/ at project root
- name: create-bundle
  intent: PM Agent creates TKT bundle from user intent
  inputs:
  - goal
  - context
  - track
  - source_plan
  - worktree
  - carryover
  outputs:
  - bundle
  constraints:
  - 2-6 worker tickets per bundle (see config/tkt.yaml)
  - worktree creates .worktrees/B-NNN and persists worktree_path/worktree_branch when requested
  - carryover imports tickets from an existing carryover.yaml
- name: claim
  intent: Claim a filesystem ticket within a bundle
  inputs:
  - bundle
  - ticket
  - agent
  outputs:
  - ticket
  constraints:
  - Must refuse claim unless ticket is open or blocked
- name: update
  intent: Update a filesystem ticket status and result summary
  inputs:
  - bundle
  - ticket
  - status
  - summary
  - evidence
  - evidence_file
  - reason
  outputs:
  - ticket
  constraints:
  - Status must be one of the configured filesystem ticket states
  - Status done requires evidence or evidence_file
  - Status blocked requires reason
  - Invalid filesystem state transitions must fail
- name: add
  intent: Add a filesystem worker ticket with structured metadata
  inputs:
  - bundle
  - title
  - description
  - category
  - effort_estimate
  - skills
  - wave
  - qa_scenarios
  - depends_on
  - source_plan
  - source_ticket_index
  - acceptance
  outputs:
  - ticket
  constraints:
  - Must persist structured metadata to the filesystem ticket YAML
  - skills and qa_scenarios are list metadata; wave is optional numeric metadata
- name: express
  intent: Manage express tickets without requiring a bundle
  inputs:
  - action
  - title
  - acceptance
  - category
  - effort_estimate
  - wave
  - source_plan
  - source_ticket_index
  - ticket_id
  - agent
  - files_changed
  - evidence
  - evidence_file
  outputs:
  - ticket
  constraints:
  - Must support create, list, claim, and close subflows for express tickets
  - Close requires evidence or evidence_file
  - Close with files_changed > 3 auto-upgrades into a bundle worker ticket
- name: bundle-status
  intent: Show bundle status with all tickets
  inputs:
  - bundle
  outputs:
  - status
  constraints:
  - Must include all ticket states for the requested bundle
- name: close-bundle
  intent: Close bundle after all worker TKTs done/failed
  inputs:
  - bundle
  - merge
  outputs:
  - result
  constraints:
  - All worker TKTs must be done or failed
  - Audit ticket must be claimed and done before bundle close
  - Audit ticket must not be claimed by the same agent as any worker ticket
  - review.yaml must auto-fill evidence_summary and acceptance_results
  - acceptance failures generate carryover.yaml and carryover_count output
  - worktree-backed bundles must be clean before close and may merge/remove on request
  - Must run structural validation and optional close_gate command before closure
  - Must evaluate command-based acceptance criteria before closure
- name: list-bundles
  intent: List all bundles and their status
  inputs: []
  outputs:
  - bundles
  constraints:
  - Must include bundle identifiers and current status summaries
- name: roadmap-transition
  intent: Transition roadmap to a new stage with gate checks
  inputs:
  - stage
  - reason
  - force
  outputs:
  - transition
  constraints:
  - Must reject invalid roadmap stages unless explicitly forced by policy
- name: roadmap-status
  intent: Show roadmap stage, bundle summary, and allowed transitions
  inputs: []
  outputs:
  - roadmap
  constraints:
  - Must report current stage and allowed next stages
- name: generate-review
  intent: Generate review bundle post-closure
  inputs:
  - bundle
  outputs:
  - review
  constraints:
  - Must only run after bundle closure artifacts exist
- name: intake-ticket
  intent: Create or sync durable ticket from note_tasks intake
  inputs:
  - ticket_id
  - title
  - from_note_tasks
  outputs:
  - ticket
  constraints:
  - Must support note/note_tasks.md as intake surface
  - Must persist task_provenance for downstream filtering
- name: list-tickets
  intent: List durable workflow tickets
  inputs:
  - unresolved_only
  - batch_id
  outputs:
  - tickets
  constraints:
  - Must support unresolved_only and batch_id filtering
- name: claim-ticket
  intent: Claim a ticket for the current session
  inputs:
  - ticket_id
  - session_id
  outputs:
  - ticket
  constraints:
  - One session may hold at most one active claimed ticket
  - Claim must be transactional and conflict-safe
- name: block-ticket
  intent: Mark a ticket as blocked
  inputs:
  - ticket_id
  - reason
  outputs: []
  constraints:
  - Block must fail unless ticket is claimed by same session
- name: close-ticket
  intent: Close the currently claimed ticket
  inputs:
  - session_id
  - ticket_id
  - resolution
  outputs: []
  constraints:
  - Must run refresh-new-tasks first
  - Integrator closure refused if new claimable tasks exist
- name: check-open-tickets
  intent: Report unresolved tickets
  inputs:
  - session_id
  outputs:
  - report
  constraints:
  - Must report unresolved durable tickets in a machine-readable summary
- name: claim-summary
  intent: Report batch/session claim ownership with policy snapshot
  inputs:
  - session_id
  - batch_id
  outputs: []
  constraints:
  - Must include collaboration policy, method laws, subagent playbook
- name: session-loop
  intent: Run the legal worker loop for one session
  inputs:
  - session_id
  - batch_id
  outputs: []
  constraints:
  - Must refresh before any claim/stop decision
  - Must resume owned ticket before claiming new
- name: refresh-new-tasks
  intent: 'Re-read note_tasks ### New and ingest new work'
  inputs:
  - batch_id
  outputs:
  - refresh_status
  constraints:
  - Must ingest only newly discovered work items from note_tasks
- name: refresh-review-inbox
  intent: Parse review inbox and ingest inbox-derived tickets
  inputs:
  - batch_id
  outputs:
  - refresh_status
  constraints:
  - Must preserve previously ingested review inbox items without duplication
- name: startup-flow
  intent: Startup/claim-loop context from zero to review handoff
  inputs:
  - session_id
  outputs:
  - startup_context
  constraints:
  - Must summarize owned tickets, claimable work, and review handoff context
- name: integrator-closure-report
  intent: Report whether integrator can legally close the batch
  inputs:
  - session_id
  outputs: []
  constraints:
  - Must refuse with CONTINUE_DUE_TO_NEW_TASKS if refresh finds new work
- name: check-ticket-scope
  intent: Report if changed files stay inside claimed ticket scope
  inputs:
  - ticket_id
  outputs: []
  constraints:
  - Must report CLEAN or SCOPE_BREACH
