schema_version: 1
skill_name: skill-system-graph
title: skill-system-graph Behavior Contract
purpose: >
  Graph navigation skill for the skill system. It parses `SKILL.spec.yaml` files
  into a dependency graph using only `depends_on` and `delegates_to`, stores the
  canonical model in PostgreSQL-backed project graph tables, and exposes CLI tools
  for topology inspection.
generated_from: SKILL.spec.yaml
updated_at: '2026-03-20T00:00:00Z'
depends_on:
  - skill-system-postgres
  - skill-system-behavior
delegates_to: []
operations:
  - name: parse-specs
    intent: Parse all skill SKILL.spec.yaml files into a normalized graph model
    inputs:
      - skills_dir
      - include_invalid
    outputs:
      - graph
      - parse_report
    constraints:
      - Must ignore SKILL.behavior.yaml and only parse SKILL.spec.yaml
      - Must include one outgoing edge per depends_on and one per delegates_to
      - Must continue on malformed specs when include_invalid is false
  - name: sync-graph
    intent: Sync the normalized graph model into PostgreSQL graph tables
    inputs:
      - skills_dir
      - force
    outputs:
      - sync_result
    constraints:
      - Must be hash-aware and skip unchanged nodes by default
      - Must remove stale skill nodes that no longer have SKILL.spec.yaml
      - Must upsert into existing skill graph tables instead of creating new schemas
  - name: show
    intent: Display the full skill graph from the current spec-scan graph model
    inputs:
      - skills_dir
      - format
    outputs:
      - graph_view
    constraints:
      - JSON output must include nodes and edges arrays
      - Must read directly from `SKILL.spec.yaml` files instead of persisted graph tables
      - Text output should remain human readable and complete
  - name: neighbors
    intent: List direct neighbor skills for a target skill
    inputs:
      - skill_name
      - format
    outputs:
      - neighbors
    constraints:
      - Must include both outgoing and incoming neighbors
      - Missing skill names must return empty arrays with an explicit status
  - name: path
    intent: Find the shortest dependency path between two skills
    inputs:
      - from_skill
      - to_skill
      - max_depth
      - format
    outputs:
      - path_result
    constraints:
      - Must return explicit not-found status when no path exists
      - Must terminate on max_depth and avoid cycles
  - name: impact
    intent: Find all transitive dependents for one skill
    inputs:
      - skill_name
      - max_depth
      - format
    outputs:
      - impact_result
    constraints:
      - Must traverse incoming `depends_on` and `delegates_to` edges
      - Must return stable order for deterministic text output
      - Must avoid cycles and deep traversal hangs
  - name: refresh
    intent: Rebuild graph from specs and refresh persistence in one command
    inputs:
      - skills_dir
      - force
      - format
    outputs:
      - refresh_result
    constraints:
      - Must be parse-specs + sync-graph in one command
      - Must surface parsed spec count alongside sync counters in the same result
