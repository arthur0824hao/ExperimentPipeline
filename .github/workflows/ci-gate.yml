name: ci-gate

on:
  pull_request:
    paths:
      - "pipeline/**"
      - "configs/**"
      - ".tkt/**"
      - ".github/workflows/ci-gate.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "pipeline/**"
      - "configs/**"
      - ".tkt/**"
      - ".github/workflows/ci-gate.yml"

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install gate dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pyyaml rich psycopg2-binary pandas numpy fastapi uvicorn pydantic

      - name: Run CI gate
        run: |
          chmod +x scripts/ci_gate.sh
          ./scripts/ci_gate.sh
