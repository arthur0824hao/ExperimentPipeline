name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  ep-gate:
    name: ep-gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install test dependencies
        run: python3 -m pip install --upgrade pip pytest pyyaml rich psycopg2-binary pandas numpy fastapi uvicorn pydantic networkx scikit-learn tqdm

      - name: Run ep-gate
        run: bash scripts/ci_gate.sh
