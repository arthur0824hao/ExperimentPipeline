spec_version: "1.0"
target: "pipeline/experiments.py"
purpose: "Module boundary contracts for experiments.py decomposition"

modules:
  gpu:
    file: "pipeline/gpu.py"
    description: "GPU monitoring, nvidia-smi parsing, process detection"
    public_api:
      - get_all_gpu_status
      - collect_gpu_status_with_error
      - collect_system_info
      - get_gpu_process_count
      - get_pid_gpu_map
      - detect_running_experiments_from_gpu_pids
    internal:
      - _coerce_nvidia_int
      - _parse_nvidia_query_output
      - _normalize_gpu_probe_error
      - get_cpu_load
      - _build_worker_gpu_free_maps
      - _best_free_mb_for_worker
      - _free_mb_for_worker_gpu
    dependencies: []

  memory_contract:
    file: "pipeline/memory_contract.py"
    description: "Memory estimation, OOM policy contract management"
    public_api:
      - get_memory_contract
      - format_memory_contract_fields
      - get_required_mem_mb
    internal:
      - _should_fallback_memory_estimator_import
      - _should_reestimate_memory_contract
      - _copy_memory_contract
      - _update_oom_policy_contract
      - _persist_oom_policy_contract
    dependencies:
      - artifact

  artifact:
    file: "pipeline/artifact.py"
    description: "Experiment artifact and result file operations"
    public_api:
      - update_running_peak
      - get_experiment_progress
      - get_completed_result_summary
    internal:
      - _load_json_dict
      - _artifact_timestamp
      - _failed_timestamp
      - _artifact_is_fresh
      - _stderr_is_empty
      - _read_resource_usage
      - _read_result_payload
      - _coerce_completed_result
      - _coerce_float
      - _coerce_int
      - _extract_peak_from_payload
      - _best_error_peak_mb
    dependencies: []

  oom:
    file: "pipeline/oom.py"
    description: "OOM parsing and dynamic batch fallback"
    public_api:
      - parse_oom_from_stderr
    internal:
      - _resolve_batch_overrides
      - _next_smaller_batches
      - _script_env_default
      - _coerce_positive_int
    dependencies: []

  formatting:
    file: "pipeline/formatting.py"
    description: "TUI formatting and status normalization helpers"
    public_api:
      - format_time_ago
      - make_bar
      - normalize_status
      - format_terminal_reason_text
      - normalize_initial_exp_page
    internal:
      - _parse_iso_ts
      - _SPINNER_FRAMES
      - _render_wait_progress
    dependencies: []

  terminal_state:
    file: "pipeline/terminal_state.py"
    description: "Terminal reason normalization and artifact truth reconciliation"
    public_api:
      - get_terminal_reason
      - reconcile_terminal_artifacts
    internal:
      - _build_terminal_metadata
      - _build_canonical_result
      - _artifact_truth_mismatch
      - _get_db_terminal_reason
    dependencies:
      - artifact
      - formatting

  condition:
    file: "pipeline/condition.py"
    description: "Condition nodes and staged matrix synthesis"
    public_api:
      - RUNTIME_CONDITION_NODES
      - RUNTIME_STAGED_MATRIX
    internal:
      - _normalize_name_list
      - _load_condition_nodes_from_runtime
      - _load_staged_matrix_entries
      - _resolve_gate_evidence_status
      - _build_condition_node_rows
      - _build_staged_matrix_rows
    dependencies:
      - formatting

  ready_queue:
    file: "pipeline/ready_queue.py"
    description: "Ready queue handoff and registry insertion workflow"
    public_api:
      - consume_ready_queue_registration_handoff
    internal:
      - _is_truthy_flag
      - _load_ready_queue_data
      - _save_json_atomic
      - _archive_experiment_via_script
      - _delete_experiment_from_registry
      - _build_ready_queue_entry
      - _enqueue_repipeline_ready
      - _is_feature_ready_for_runner
      - _insert_registered_configs
    dependencies: []
    guarantees:
      - "ready_register-style DB sync preserves per-entry runtime fields needed by workers (env, batch_size, eval_batch_size, max_retries, preferred_worker, group_id)"

  cluster:
    file: "pipeline/cluster.py"
    description: "Multi-node SSH cluster lifecycle manager"
    public_api:
      - ClusterManager
      - get_cluster_status
      - get_network_health
    internal: []
    dependencies:
      - artifact
      - formatting
    guarantees:
      - "Workers started through DB tunnel launchers export both EXP_PGHOST/PGHOST=127.0.0.1 and EXP_PGPORT/PGPORT=<tunnel_port> so remote runners use TCP instead of Unix socket fallback"

  dashboard_input:
    file: "pipeline/dashboard_input.py"
    description: "Dashboard TTY acquisition, key decoding, and non-blocking key polling"
    public_api:
      - DashboardInputSession
      - read_dashboard_key
    internal: []
    dependencies: []

  machine_constraints:
    file: "pipeline/machine_constraints.py"
    description: "Shared machine inventory loading and heartbeat whitelist filtering"
    public_api:
      - load_machine_constraints
      - load_worker_whitelist
      - filter_worker_heartbeats
      - get_worker_heartbeat
    internal:
      - normalize_worker_whitelist
    dependencies: []

  allocator:
    file: "pipeline/allocator.py"
    description: "GPU memory-aware scheduling and formal slot serialization"
    public_api:
      - GPUAllocator
      - enforce_formal_slot_serialization
    internal: []
    dependencies:
      - gpu
      - artifact
    guarantees:
      - "Allocator claim headroom supports per-machine override (gpu_claim_headroom_mb)"

  health:
    file: "pipeline/health.py"
    description: "Runner/process health checks, stale detection, and conflict healing"
    public_api:
      - cleanup_on_startup
      - enforce_running_pid_registration
      - reap_orphan_runner_processes
      - reap_orphan_training_processes
      - check_stale_locks
      - self_heal_heartbeat_worker_conflicts
      - check_zombie_processes
      - process_remote_termination_requests
    internal:
      - _get_active_runner_pids_from_db
      - _kill_local_pid_tree
      - _extract_exp_name_from_cmd
    dependencies:
      - formatting

  worker:
    file: "pipeline/worker.py"
    description: "Experiment execution lifecycle, run fencing, and retry handling"
    public_api:
      - run_experiment_process
      - mark_running
      - mark_done
      - mark_error
    internal:
      - update_lock_pid
      - release_distributed_lock
      - _clean_experiment_artifacts
      - _clear_runtime_markers
    dependencies:
      - gpu
      - memory_contract
      - oom
      - artifact
      - terminal_state

  logging:
    file: "pipeline/logging.py"
    description: "Runner log sink with best-effort lock discipline"
    public_api:
      - HybridLogger
    internal: []
    dependencies: []

dashboard:
    file: "pipeline/experiments.py"
    description: "UnifiedDashboard cluster panel rendering with GPU marker logic"
    public_api:
      - UnifiedDashboard
      - build_cluster_panel
    internal:
      - _render_gpu_row
      - _format_mem
    guarantees:
      - "GPU markers may show both star (our job) and triangle (foreign usage) simultaneously"
      - "Star marker (★) indicates GPU is used by one of our RUNNING experiments"
      - "Triangle marker (▲) indicates GPU has >500MB VRAM used by non-our processes"
      - "Both markers can coexist on the same GPU row when both conditions are met"
      - "Blank marker (no ★, no ▲) indicates GPU is free"
      - "Marker color: ★ is green, ▲ is yellow"
      - "When worker is OFFLINE/STALE, PID/Run/Mine fields are labeled as stale or last-reported metadata"
      - "OFFLINE cards must not visually imply live health from stale process remnants"
    marker_logic:
      - "Step1: Check if GPU index is in our_gpu_ids (from DB query)"
      - "Step2: Check if VRAM used > 500MB by any process"
      - "Step3: Render markers independently (not mutually exclusive)"
      - "Result combinations: empty, ★ only, ▲ only, ★▲ combined"

cross_cutting:
  - "UnifiedDashboard stays in experiments.py for now"
  - "main() and scheduler_loop stay in experiments.py"
  - "Input/TTY stream setup and key polling live in pipeline/dashboard_input.py; experiments.py consumes ready keys only"
  - "Pure panel navigation (up/down/page) lives in pipeline/panel_nav.py; no DB, no enqueue, no side effects"
  - "Experiment panel navigation and selection use already-rendered panel rows; registry DB loads are for command execution paths, not cursor movement"
  - "clamp_exp_selection is called only from the render path (build_experiments_panel), never from the key handler"
  - "Constants (STATUS_*, paths, thresholds) stay in experiments.py"
  - "Watch mode is a read-only DB monitor + manual control surface and allows multiple concurrent instances"
  - "Watch mode has no singleton lock and must not create or depend on lock files"
  - "Watch scheduler branch is passive-only: no background DB mutation jobs (no auto-archive, no remote-termination polling)"
  - "Cluster panel navigation uses WASD + arrow keys with grid semantics (W=up, A=left, S=down, D=right)"
  - "Cluster machine cards remain dense with runtime detail (status, CPU, GPU, recent runs, last-seen)"
  - "GPU row markers ★ and ▲ are independent and may coexist on the same GPU"
  - "Panel health semantics: ONLINE (<60s), STALE (60-120s), OFFLINE (>=120s or missing heartbeat)"
  - "Watch mode is monitor-only and must not trigger SSH side effects (no implicit start/restart)"
  - "Manual cluster actions (start/stop/restart/enable/disable) are the only interactive SSH path"
  - "Cluster status CLI payload includes network_health and postgres_health blocks for control-plane diagnostics"
  - "Allocation strategy is DB-backed and read in real-time before new claims (distributed or centralized)"
  - "Watch panel can switch allocation strategy via action/key path without editing config files"
  - "Runner process ignores SIGHUP to avoid accidental worker teardown from control-plane/session events"
  - "Worker loop is self-contained for heartbeat + queue processing; any future auto-repair must be separate from watch"
  - "Dashboard header must expose current focus (Cluster vs Experiments) so panel-specific keymaps are visible to operators"
  - "Experiment-only keys (repipeline/start-now/move/page) may auto-focus into the experiments panel when pressed from cluster mode"
  - "Heartbeat whitelist filtering is shared through pipeline/machine_constraints.py and consumed by db_registry, cluster, and health"
